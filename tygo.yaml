packages:
  - path: "github.com/bluenviron/goroslib/v2/pkg/msgs/geometry_msgs"
    output_path: "web/src/types/ros/geometry_msgs"
  - path: "github.com/bluenviron/goroslib/v2/pkg/msgs/visualization_msgs"
    output_path: "web/src/types/ros/visualization_msgs"
  - path: "github.com/bluenviron/goroslib/v2/pkg/msgs/nav_msgs"
    output_path: "web/src/types/ros/nav_msgs"
  - path: "github.com/cedbossneo/openmower-gui/pkg/msgs/dynamic_reconfigure"
    output_path: "web/src/types/ros/dynamic_reconfigure"
  - path: "github.com/cedbossneo/openmower-gui/pkg/msgs/mower_msgs"
    output_path: "web/src/types/ros/mower_msgs"
  - path: "github.com/cedbossneo/openmower-gui/pkg/msgs/mower_map"
    output_path: "web/src/types/ros/mower_map"
    frontmatter: |
      import {Polygon, Pose} from '../geometry_msgs/index.ts'
    type_mappings:
      geometry_msgs.Polygon: "Polygon"
      geometry_msgs.Pose: "Pose"
  - path: "github.com/cedbossneo/openmower-gui/pkg/msgs/xbot_msgs"
    output_path: "web/src/types/ros/xbot_msgs"
    frontmatter: |
      import {Polygon, PoseWithCovariance, Vector3} from '../geometry_msgs/index.ts'
    type_mappings:
      geometry_msgs.Polygon: "Polygon"
      geometry_msgs.PoseWithCovariance: "PoseWithCovariance"
      geometry_msgs.Vector3: "Vector3"
